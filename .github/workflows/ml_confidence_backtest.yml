name: ML Edge Confidence Backtest

# Manual-only (workflow_dispatch) — this is a one-off research run, not a
# recurring job. Runs research/walk_forward_backtest.py + analyze_confidence.py
# on GitHub's runners, since that's where ALPACA_API_KEY/ALPACA_SECRET_KEY
# already live (same secrets scan.yml uses) — no local credentials needed.
# See docs/ml-edge-confidence-research.md for what this is answering.

on:
  workflow_dispatch:
    inputs:
      n_tickers:
        description: "Number of tickers to sample (sector-balanced, price/volume-filtered)"
        required: false
        default: "60"
      lookback_days:
        description: "Trading days of history to fetch per ticker"
        required: false
        default: "760"
      step_days:
        description: "Walk-forward step size in trading days"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    # A single ensemble_ml_forecast() call takes ~1.2s locally; the default
    # 60 tickers x ~45 walk-forward windows each is ~2700 calls, so budget
    # generously (public repo — Actions minutes are free either way). Extra
    # room beyond the regression backtest's own budget accounts for the
    # triple-barrier step's per-ticker compute_trade_plan() sweep below, plus
    # the one-time FinBERT model download and per-ticker CPU inference (core.
    # sentiment, fetched via Alpaca's News API) both scripts now also do.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          # ubuntu-latest runners have no GPU — installing plain "torch" from PyPI can
          # pull a much larger CUDA-enabled wheel for no benefit. Installing the CPU-only
          # build first from PyTorch's own index satisfies requirements.txt's torch>=2.0
          # constraint without the extra download/install weight on every run.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run walk-forward backtest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          # Optional — enables insider-trading/daily-rating/analyst-revision features
          # (core.ml_forecast's insider_df/rating_df/grades_df). Degrades gracefully to
          # "features skipped" if unset. News-sentiment (core.ml_forecast's sentiment_df)
          # needs no separate key — it's fetched via the ALPACA_* creds already above.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          # walk_forward_backtest.py appends per-ticker (so a run interrupted partway
          # through doesn't lose completed tickers) — start each workflow run from a
          # clean file rather than accumulating duplicate rows across separate runs.
          rm -f research/walk_forward_results.csv
          python -m research.walk_forward_backtest \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --step-days "${{ inputs.step_days }}"

      - name: Analyze confidence calibration
        run: |
          set -eo pipefail
          python -m research.analyze_confidence | tee research/walk_forward_summary.txt

      # research/pooled_model_experiment.py (punch-list item #1) was removed from here once
      # pooling-for-prediction was ruled out worse than per-ticker training — see
      # docs/ml-edge-confidence-research.md's "pooling made it worse" update. It's back
      # below for a different reason: it's now the cheapest way to get a full ranked
      # feature-importance list (a single pooled model over every ticker's combined data),
      # which research/walk_forward_backtest.py's per-step retrain design never captures.
      # Diagnostic only — not a reconsideration of pooling as the primary approach.
      - name: Run pooled feature-importance diagnostic
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          python -m research.pooled_model_experiment \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            | tee research/pooled_model_summary.txt

      - name: Run triple-barrier walk-forward
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          # Same reasoning as walk_forward_results.csv above — start from a clean file.
          rm -f research/triple_barrier_results.csv
          python -m research.triple_barrier_walk_forward \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}"

      - name: Analyze triple-barrier calibration
        run: |
          set -eo pipefail
          python -m research.analyze_triple_barrier | tee research/triple_barrier_summary.txt

      - name: Commit results
        if: always()
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # if: always() means this runs even if an earlier step failed (and possibly never
          # wrote one of these files) — only stage whatever actually exists, so a failure in
          # one step doesn't also throw away another step's completed results.
          for f in research/walk_forward_results.csv research/walk_forward_summary.txt \
                   research/pooled_model_summary.txt research/pooled_feature_importances.csv \
                   research/triple_barrier_results.csv research/triple_barrier_summary.txt \
                   research/triple_barrier_feature_importances.csv; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "ML edge confidence backtest: $(date -u +%Y-%m-%d\ %H:%M)Z"
          # This step's own results are already committed locally above; a concurrent
          # push to main during this run's ~30min window (e.g. a separate PR merge) can
          # make a plain `git push` fail with "fetch first" and silently lose this run's
          # results (confirmed happened once). Rebase onto the latest main and retry
          # rather than push once and give up.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            echo "push attempt $attempt failed, rebasing onto latest main and retrying" >&2
            git pull --rebase origin main
            if [ "$attempt" = 3 ]; then exit 1; fi
          done
