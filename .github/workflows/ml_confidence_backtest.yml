name: ML Edge Confidence Backtest

# Manual-only (workflow_dispatch) — this is a one-off research run, not a
# recurring job. Runs research/walk_forward_backtest.py + analyze_confidence.py
# on GitHub's runners, since that's where ALPACA_API_KEY/ALPACA_SECRET_KEY
# already live (same secrets scan.yml uses) — no local credentials needed.
# See docs/ml-edge-confidence-research.md for what this is answering.
#
# Scope has broadened well past its original name: the rules_based_walk_forward.py
# steps test something different from everything above them — not an ML layer, but
# whether the base rules-based screening/trade-plan system has a real edge on its own,
# no ML involved at all. The smartscore_walk_forward.py steps go a level deeper still —
# not exit/target mechanics (all three rules_based target modes turned out unprofitable)
# but whether the entry signal itself (core.smartscore's setup classification and
# scoring weights) tracks forward returns at all (it didn't — no-signal control beat
# every signal category). The momentum_walk_forward.py steps test a candidate
# replacement entirely independent of core.smartscore: cross-sectional 12-1 momentum,
# unlike anything tested above. Kept in this one workflow rather than separate files
# for the shared ticker sampling/credentials and one trigger to remember, not because
# it's still only about "ML edge confidence."

on:
  workflow_dispatch:
    inputs:
      n_tickers:
        description: "Number of tickers to sample (sector-balanced, price/volume-filtered)"
        required: false
        default: "60"
      lookback_days:
        description: "Trading days of history to fetch per ticker"
        required: false
        default: "760"
      step_days:
        description: "Walk-forward step size in trading days"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    # A single ensemble_ml_forecast() call takes ~1.2s locally; the default
    # 60 tickers x ~45 walk-forward windows each is ~2700 calls, so budget
    # generously (public repo — Actions minutes are free either way). Extra
    # room beyond the regression backtest's own budget accounts for the
    # triple-barrier step's per-ticker compute_trade_plan() sweep below, plus
    # the one-time FinBERT model download and per-ticker CPU inference (core.
    # sentiment, fetched via Alpaca's News API) both scripts now also do.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          # ubuntu-latest runners have no GPU — installing plain "torch" from PyPI can
          # pull a much larger CUDA-enabled wheel for no benefit. Installing the CPU-only
          # build first from PyTorch's own index satisfies requirements.txt's torch>=2.0
          # constraint without the extra download/install weight on every run.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run walk-forward backtest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          # Optional — enables insider-trading/daily-rating/analyst-revision features
          # (core.ml_forecast's insider_df/rating_df/grades_df). Degrades gracefully to
          # "features skipped" if unset. News-sentiment (core.ml_forecast's sentiment_df)
          # needs no separate key — it's fetched via the ALPACA_* creds already above.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          # walk_forward_backtest.py appends per-ticker (so a run interrupted partway
          # through doesn't lose completed tickers) — start each workflow run from a
          # clean file rather than accumulating duplicate rows across separate runs.
          rm -f research/walk_forward_results.csv
          python -m research.walk_forward_backtest \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --step-days "${{ inputs.step_days }}"

      - name: Analyze confidence calibration
        run: |
          set -eo pipefail
          python -m research.analyze_confidence | tee research/walk_forward_summary.txt

      # research/pooled_model_experiment.py (punch-list item #1) was removed from here once
      # pooling-for-prediction was ruled out worse than per-ticker training — see
      # docs/ml-edge-confidence-research.md's "pooling made it worse" update. It's back
      # below for a different reason: it's now the cheapest way to get a full ranked
      # feature-importance list (a single pooled model over every ticker's combined data),
      # which research/walk_forward_backtest.py's per-step retrain design never captures.
      # Diagnostic only — not a reconsideration of pooling as the primary approach.
      - name: Run pooled feature-importance diagnostic
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          python -m research.pooled_model_experiment \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            | tee research/pooled_model_summary.txt

      - name: Run triple-barrier walk-forward
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          set -eo pipefail
          # Same reasoning as walk_forward_results.csv above — start from a clean file.
          rm -f research/triple_barrier_results.csv
          python -m research.triple_barrier_walk_forward \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}"

      - name: Analyze triple-barrier calibration
        run: |
          set -eo pipefail
          python -m research.analyze_triple_barrier | tee research/triple_barrier_summary.txt

      # Tests something different from every step above: not an ML layer, but whether the
      # base rules-based system (core.smartscore + core.trade_plan, no ML at all) has a
      # real edge on its own. No FMP/News dependency — 100% price/volume-derived.
      - name: Run rules-based walk-forward
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -eo pipefail
          rm -f research/rules_based_results.csv
          python -m research.rules_based_walk_forward \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}"

      - name: Analyze rules-based results
        run: |
          set -eo pipefail
          if [ -s research/rules_based_results.csv ]; then
            python -m research.analyze_rules_based | tee research/rules_based_summary.txt
          else
            echo "Skipping rules-based analysis: research/rules_based_results.csv is missing or empty"
          fi

      # Isolation test from the 2026-07-12 negative-expectancy finding: same entries/stops
      # as the step above, but a flat settings.min_risk_reward target instead of the
      # Fibonacci extension implicated as the likely cause (10.55:1 average R:R, 5.4% win
      # rate). Answers whether SmartScore's entry-timing has value once the target isn't
      # set unrealistically far for MAX_HOLD_DAYS.
      - name: Run rules-based walk-forward (flat target isolation test)
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -eo pipefail
          rm -f research/rules_based_results_flat_target.csv
          python -m research.rules_based_walk_forward --target-mode flat \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --output research/rules_based_results_flat_target.csv

      - name: Analyze rules-based results (flat target isolation test)
        run: |
          set -eo pipefail
          if [ -s research/rules_based_results_flat_target.csv ]; then
            python -m research.analyze_rules_based --input research/rules_based_results_flat_target.csv \
              | tee research/rules_based_summary_flat_target.txt
          else
            echo "Skipping flat-target analysis: research/rules_based_results_flat_target.csv is missing or empty"
          fi

      # Second isolation test, added after the flat-target run confirmed target distance
      # was a real driver (5.4%->16.2% win rate) but didn't reach breakeven on its own.
      # Flat mode ties the target to the *stop* distance; this mode instead ties it to
      # this ticker's own trailing volatility scaled to MAX_HOLD_DAYS, so the win rate can
      # be compared directly against the ~16% a pure random walk would clear at
      # VOL_TARGET_K=1.0 — a direct test of whether SmartScore's entries have real
      # directional edge, independent of R:R-implied breakeven math.
      - name: Run rules-based walk-forward (volatility target isolation test)
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -eo pipefail
          rm -f research/rules_based_results_volatility_target.csv
          python -m research.rules_based_walk_forward --target-mode volatility \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --output research/rules_based_results_volatility_target.csv

      - name: Analyze rules-based results (volatility target isolation test)
        run: |
          set -eo pipefail
          if [ -s research/rules_based_results_volatility_target.csv ]; then
            python -m research.analyze_rules_based --input research/rules_based_results_volatility_target.csv \
              | tee research/rules_based_summary_volatility_target.txt
          else
            echo "Skipping volatility-target analysis: research/rules_based_results_volatility_target.csv is missing or empty"
          fi

      # None of the three target-mode tests above are a demonstrated profitable edge —
      # target-distance modeling was a real, fixable problem, but fixing it alone doesn't
      # create one. This tests something different: not exit/target mechanics at all, but
      # whether the *entry* signal itself (core.smartscore.classify_setup()'s Breakout/
      # Pullback thresholds and compute_smartscore's bonus weights) tracks raw forward
      # returns, against a no-signal control population as a baseline.
      - name: Run SmartScore walk-forward
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -eo pipefail
          rm -f research/smartscore_results.csv
          python -m research.smartscore_walk_forward \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --step-days "${{ inputs.step_days }}"

      - name: Analyze SmartScore results
        run: |
          set -eo pipefail
          if [ -s research/smartscore_results.csv ]; then
            python -m research.analyze_smartscore | tee research/smartscore_summary.txt
          else
            echo "Skipping SmartScore analysis: research/smartscore_results.csv is missing or empty"
          fi

      # SmartScore's entry signal showed no evidence of predictive value (the no-signal
      # control outperformed every signal category). This tests a completely different,
      # independent candidate: cross-sectional 12-1 momentum (Jegadeesh & Titman) — one
      # of the most replicated factors in equity research, unlike the technical-setup
      # heuristics tested above.
      - name: Run momentum walk-forward
        if: always()
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          set -eo pipefail
          rm -f research/momentum_results.csv
          python -m research.momentum_walk_forward \
            --n-tickers "${{ inputs.n_tickers }}" \
            --lookback-days "${{ inputs.lookback_days }}" \
            --step-days "${{ inputs.step_days }}"

      - name: Analyze momentum results
        run: |
          set -eo pipefail
          if [ -s research/momentum_results.csv ]; then
            python -m research.analyze_momentum | tee research/momentum_summary.txt
          else
            echo "Skipping momentum analysis: research/momentum_results.csv is missing or empty"
          fi

      - name: Commit results
        if: always()
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # if: always() means this runs even if an earlier step failed (and possibly never
          # wrote one of these files) — only stage whatever actually exists, so a failure in
          # one step doesn't also throw away another step's completed results.
          for f in research/walk_forward_results.csv research/walk_forward_summary.txt \
                   research/pooled_model_summary.txt research/pooled_feature_importances.csv \
                   research/triple_barrier_results.csv research/triple_barrier_summary.txt \
                   research/triple_barrier_feature_importances.csv \
                   research/rules_based_results.csv research/rules_based_summary.txt \
                   research/rules_based_results_flat_target.csv research/rules_based_summary_flat_target.txt \
                   research/rules_based_results_volatility_target.csv research/rules_based_summary_volatility_target.txt \
                   research/smartscore_results.csv research/smartscore_summary.txt \
                   research/momentum_results.csv research/momentum_summary.txt; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "ML edge confidence backtest: $(date -u +%Y-%m-%d\ %H:%M)Z"
          # This step's own results are already committed locally above; a concurrent
          # push to main during this run's ~30min window (e.g. a separate PR merge) can
          # make a plain `git push` fail with "fetch first" and silently lose this run's
          # results (confirmed happened once). Rebase onto the latest main and retry
          # rather than push once and give up.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            echo "push attempt $attempt failed, rebasing onto latest main and retrying" >&2
            git pull --rebase origin main
            if [ "$attempt" = 3 ]; then exit 1; fi
          done
