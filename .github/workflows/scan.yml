name: SwingFinder Scan

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit universe to first N tickers (blank = full universe)"
        required: false
        default: "20"
      skip_ml:
        description: "Skip ML/multi-timeframe/relative-strength enrichment (faster)"
        required: false
        default: false
        type: boolean
      skip_decision:
        description: "Skip Anthropic synthesis (agents 1-3 only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          # ubuntu-latest runners have no GPU — installing plain "torch" from PyPI can
          # pull a much larger CUDA-enabled wheel for no benefit (core.ml_forecast's
          # sentiment_df feature is optional at runtime, but requirements.txt's torch>=2.0
          # is still installed every run regardless). Installing the CPU-only build first
          # from PyTorch's own index satisfies that constraint without the extra weight.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Restore Webull auth token
        env:
          WEBULL_TOKEN_CONTENT_B64: ${{ secrets.WEBULL_TOKEN_CONTENT }}
        run: |
          set -eo pipefail
          mkdir -p webull_token
          echo "$WEBULL_TOKEN_CONTENT_B64" | base64 -d > webull_token/token.txt

      - name: Run pipeline
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
          WEBULL_REGION_ID: us
          WEBULL_ENVIRONMENT: prod
          WEBULL_TOKEN_DIR: ${{ github.workspace }}/webull_token
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -eo pipefail
          mkdir -p results
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.skip_ml }}" = "true" ]; then ARGS="$ARGS --skip-ml"; fi
          if [ "${{ inputs.skip_decision }}" = "true" ]; then ARGS="$ARGS --skip-decision"; fi
          python pipeline.py $ARGS | tee results/latest.json
          cp results/latest.json "results/$(date -u +%Y-%m-%d_%H%M)Z.json"

      - name: Prune archived results older than 15 days
        run: |
          set -eo pipefail
          cutoff=$(date -u -d "15 days ago" +%Y-%m-%d)
          for f in results/*.json; do
            base=$(basename "$f")
            [ "$base" = "latest.json" ] && continue
            filedate="${base:0:10}"
            if [[ "$filedate" < "$cutoff" ]]; then
              echo "Removing stale result: $f"
              rm -f "$f"
            fi
          done

      - name: Commit results
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ ml_predictions.csv pick_outcomes.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Scan results: $(date -u +%Y-%m-%d\ %H:%M)Z"
          git push
